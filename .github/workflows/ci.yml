name: React Vite CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'  # ← Tell it where to find lock file

      - name: Install dependencies
        working-directory: ./frontend  # ← Go into frontend folder
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend  # ← Go into frontend folder
        run: npm run lint

      - name: Build project
        working-directory: ./frontend  # ← Go into frontend folder
        run: npm run build