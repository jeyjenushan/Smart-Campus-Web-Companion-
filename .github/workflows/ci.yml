name: CI – Build & Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build Output ==="
          ls -lh dist/

          echo "=== Asset sizes ==="
          ls -lh dist/assets/ | head -20 || true

          echo "=== PWA Service Worker ==="
          test -f dist/sw.js && echo "Service Worker present" || echo "Service Worker missing"

          echo "=== index.html ==="
          test -f dist/index.html && echo "index.html present" || exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-sync-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: campus-sync-dist-${{ github.sha }}
          path: dist/

      - name: Check bundle sizes
        run: |
          echo "=== Bundle Size Report ==="

          echo "Total dist size:"
          du -sh dist/

          echo "Asset files:"
          ls -lh dist/assets/ || true

          vendor=$(find dist/assets -name "vendor*.js" -print -quit)

          if [ -n "$vendor" ]; then
            size=$(stat -c%s "$vendor")
            echo "Vendor chunk size: $size bytes"

            if [ "$size" -gt 524288 ]; then
              echo "Warning: vendor chunk is larger than 500KB"
            else
              echo "Vendor chunk size is good"
            fi
          else
            echo "No vendor chunk found"
          fi