name: CI – Build & Quality Check

on:
  push:
    branches: main


env:
  NODE_VERSION: '20'

jobs:
  # ─── Job 1: Code Quality ───────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  # ─── Job 2: Build ──────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          echo "=== Build Output ==="
          ls -lh dist/
          echo "=== Asset sizes ==="
          ls -lh dist/assets/ | head -20
          echo "=== SW generated ==="
          test -f dist/sw.js && echo "Service Worker present" || echo "❌ Service Worker MISSING"
          test -f dist/index.html && echo "index.html present" || echo "❌ index.html MISSING"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-sync-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─── Job 3: Security Audit ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          echo "=== Dependency audit summary ==="
          npm audit --json 2>/dev/null | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const m = d.metadata?.vulnerabilities ?? {};
            console.log('Critical:', m.critical ?? 0);
            console.log('High:    ', m.high     ?? 0);
            console.log('Moderate:', m.moderate  ?? 0);
            console.log('Low:     ', m.low       ?? 0);
          " || echo "Audit complete"

  # ─── Job 4: Bundle Size Check ──────────────────────────────────────────────
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: campus-sync-dist-${{ github.sha }}
          path: dist/

      - name: Check bundle sizes
        run: |
          echo "=== Bundle Size Report ==="
          total=$(du -sb dist/ | cut -f1)
          echo "Total dist size: $(du -sh dist/ | cut -f1)"

          # Warn if vendor chunk > 500KB
          vendor=$(find dist/assets -name "vendor*.js" | xargs ls -l 2>/dev/null | awk '{print $5}' | head -1)
          if [ ! -z "$vendor" ] && [ "$vendor" -gt 524288 ]; then
            echo "Warning: vendor chunk is large (${vendor} bytes)"
          else
            echo "Bundle sizes look good"
          fi
